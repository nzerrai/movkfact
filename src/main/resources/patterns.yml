# Pattern-based detection rules for CSV column type detection
# Supports 13 ColumnTypes across 3 typologies
# Used by PatternCache for regex compilation at startup

# PERSONAL TYPOLOGY (6 types)
FIRST_NAME:
  - "(?i)^first_?name$"
  - "(?i)^prenom$"
  - "(?i)^forename$"
  - "(?i)^given_?name$"

LAST_NAME:
  - "(?i)^last_?name$"
  - "(?i)^family_?name$"
  - "(?i)^nom$"
  - "(?i)^surname$"
  - "(?i)^name$"
  - "(?i)^nom_?famille$"
  - "(?i)^nom_?de_?famille$"

EMAIL:
  - "(?i)^email$"
  - "(?i)^e_?mail$"
  - "(?i)^electronic_?mail$"
  - "(?i)^mail_?address$"

GENDER:
  - "(?i)^gender$"
  - "(?i)^sex$"
  - "(?i)^genre$"
  - "(?i)^sexe$"

PHONE:
  - "(?i)^phone$"
  - "(?i)^telephone$"
  - "(?i)^tel$"
  - "(?i)^phone_?number$"

ADDRESS:
  - "(?i)^address$"
  - "(?i)^adresse$"
  - "(?i)^street$"
  - "(?i)^rue$"
  - "(?i)^location$"
  - "(?i)^full_?address$"

ZIP_CODE:
  - "(?i)^zip_?code$"
  - "(?i)^postal_?code$"
  - "(?i)^code_?postal$"
  - "(?i)^zip$"
  - "(?i)^cp$"

CITY:
  - "(?i)^city$"
  - "(?i)^ville$"
  - "(?i)^town$"
  - "(?i)^municipality$"

INTEGER:
  - "(?i)^age$"
  - "(?i)^age_?actuel$"
  - "(?i)^current_?age$"
  - "(?i)^age_?courant$"
  - "(?i)^quantite$"
  - "(?i)^quantity$"
  - "(?i)^rang$"
  - "(?i)^rank$"
  - "(?i)^score$"
  - "(?i)^note$"

# FINANCIAL TYPOLOGY (3 types)
AMOUNT:
  - "(?i)^amount$"
  - "(?i)^montant$"
  - "(?i)^sum$"
  - "(?i)^total$"
  - "(?i)^value$"
  - "(?i)^price$"

ACCOUNT_NUMBER:
  - "(?i)^account_?number$"
  - "(?i)^account$"
  - "(?i)^compte$"
  - "(?i)^iban$"
  - "(?i)^bban$"
  - "(?i)^account_?id$"

CURRENCY:
  - "(?i)^currency$"
  - "(?i)^devise$"
  - "(?i)^code_?currency$"
  - "(?i)^currency_?code$"
  - "(?i)^curr$"

# TEMPORAL TYPOLOGY (4 types)
BIRTH_DATE:
  - "(?i)^date_?birth$"
  - "(?i)^birthdate$"
  - "(?i)^birth_?date$"
  - "(?i)^naissance$"
  - "(?i)^date_?naissance$"
  - "(?i)^date_?de_?naissance$"
  - "(?i)^date_?of_?birth$"
  - "(?i)^dob$"

DATE:
  - "(?i)^date$"
  - "(?i)^created_?at$"
  - "(?i)^created_?date$"
  - "(?i)^date_?created$"
  - "(?i)^modified_?at$"
  - "(?i)^updated_?at$"
  - "(?i)^timestamp$"

TIME:
  - "(?i)^time$"
  - "(?i)^heure$"
  - "(?i)^hour$"
  - "(?i)^minute$"
  - "(?i)^time_?of_?day$"

TIMEZONE:
  - "(?i)^timezone$"
  - "(?i)^tz$"
  - "(?i)^timezone_?code$"
  - "(?i)^time_?zone$"

# NUMERIC TYPOLOGY (additional)
DECIMAL:
  - "(?i)^decimal$"
  - "(?i)^float$"
  - "(?i)^double$"
  - "(?i)^montant_?decimal$"
  - "(?i)^prix$"

PERCENTAGE:
  - "(?i)^percentage$"
  - "(?i)^pourcentage$"
  - "(?i)^taux$"
  - "(?i)^rate$"
  - "(?i)^pct$"

BOOLEAN:
  - "(?i)^boolean$"
  - "(?i)^bool$"
  - "(?i)^actif$"
  - "(?i)^active$"
  - "(?i)^enabled$"
  - "(?i)^flag$"
  - "(?i)^boolean_?actif$"

ENUM:
  - "(?i)^enum$"
  - "(?i)^statut$"
  - "(?i)^status$"
  - "(?i)^categorie$"
  - "(?i)^category$"
  - "(?i)^type$"
  - "(?i)^etat$"
  - "(?i)^state$"

TEXT:
  - "(?i)^text$"
  - "(?i)^texte$"
  - "(?i)^description$"
  - "(?i)^comment$"
  - "(?i)^commentaire$"
  - "(?i)^note_?text$"
  - "(?i)^remarks$"
  - "(?i)^remarques$"

# IDENTIFIER TYPOLOGY
UUID:
  - "(?i)^uuid$"
  - "(?i)^guid$"
  - "(?i)^identifier$"
  - "(?i)^identifiant$"

URL:
  - "(?i)^url$"
  - "(?i)^website$"
  - "(?i)^site_?web$"
  - "(?i)^lien$"
  - "(?i)^link$"
  - "(?i)^webpage$"

IP_ADDRESS:
  - "(?i)^ip_?address$"
  - "(?i)^ip$"
  - "(?i)^adresse_?ip$"
  - "(?i)^ipv4$"
  - "(?i)^ipv6$"

# GEOGRAPHIC TYPOLOGY (additional)
COUNTRY:
  - "(?i)^country$"
  - "(?i)^pays$"
  - "(?i)^nation$"
  - "(?i)^country_?code$"
  - "(?i)^code_?pays$"

COMPANY:
  - "(?i)^company$"
  - "(?i)^entreprise$"
  - "(?i)^societe$"
  - "(?i)^organization$"
  - "(?i)^organisation$"
  - "(?i)^employeur$"
