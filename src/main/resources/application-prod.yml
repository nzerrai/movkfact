spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:movkfactdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:movkfact_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  h2:
    console:
      enabled: false

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always  # Creates Spring Batch metadata tables for PostgreSQL

jwt:
  secret: ${JWT_SECRET:change-me-to-secure-key-in-production}

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: WARN
    com.movkfact: INFO
