spring:
  datasource:
    url: jdbc:h2:file:./data/movkfactdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    
  h2:
    console:
      enabled: true
      path: /h2-console
      
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  flyway:
    enabled: false  # H2 uses ddl-auto: create-drop, Flyway not needed in dev

  # Spring Batch Configuration (S3.2)
  batch:
    job:
      enabled: false  # Don't auto-run batch jobs on startup
    jdbc:
      initialize-schema: always  # Create batch metadata tables in H2

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:movkfact-dev-secret-key-change-in-production-immediately}

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
