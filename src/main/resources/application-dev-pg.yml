# Profil PostgreSQL local pour tests d'intégration
# Usage: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev-pg
# Prérequis: docker-compose up -d (postgres:15-alpine sur port 5432)

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/movkfactdb
    driver-class-name: org.postgresql.Driver
    username: movkfact_user
    password: movkfact_dev_password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # Safe pour re-runs sur DB existante

  h2:
    console:
      enabled: false

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

jwt:
  secret: ${JWT_SECRET:movkfact-dev-pg-secret-key-32chars-min}

server:
  port: 8080
  servlet:
    context-path: /
